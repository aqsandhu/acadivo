# =============================================================================
# Acadivo — Staging Deployment Pipeline
# Triggers: push to develop branch
# Strategy: Build images → Push to GHCR → Deploy via SSH → Smoke tests → Rollback on failure
# =============================================================================

name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/acadivo

jobs:
  # ── 1. Build & Push Docker Images ──────────────────────────────────────────
  build-and-push:
    name: Build & Push Staging Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, web, socket]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=staging

  # ── 2. Deploy to Staging Server ────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.acadivo.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "🚀 Starting staging deployment..."

            # Navigate to project
            cd ~/acadivo || { echo "Project directory not found"; exit 1; }

            # Pull latest compose and env
            git fetch origin develop
            git checkout origin/develop -- docker/ scripts/ .env.staging

            # Pull latest images
            docker pull ${{ env.IMAGE_PREFIX }}-api:staging-latest
            docker pull ${{ env.IMAGE_PREFIX }}-web:staging-latest
            docker pull ${{ env.IMAGE_PREFIX }}-socket:staging-latest

            # Run database migrations (before app restart)
            echo "📦 Running database migrations..."
            docker run --rm \
              --network acadivo-network \
              -e DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}" \
              ${{ env.IMAGE_PREFIX }}-api:staging-latest \
              npx prisma migrate deploy

            # Rolling update with zero downtime
            echo "🔄 Performing rolling update..."
            docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml \
              --env-file .env.staging \
              up -d --no-deps --scale api=2 api

            sleep 5

            docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml \
              --env-file .env.staging \
              up -d --no-deps --scale socket=2 socket

            sleep 5

            docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml \
              --env-file .env.staging \
              up -d --no-deps web

            # Wait for health checks
            echo "⏳ Waiting for health checks..."
            sleep 15

            # Health check
            echo "🏥 Running health checks..."
            HEALTH_STATUS=$(curl -sf https://staging.acadivo.com/api/health && echo "OK" || echo "FAIL")
            WEB_STATUS=$(curl -sf https://staging.acadivo.com && echo "OK" || echo "FAIL")

            if [ "$HEALTH_STATUS" != "OK" ] || [ "$WEB_STATUS" != "OK" ]; then
              echo "❌ Health checks failed! Rolling back..."
              docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml \
                --env-file .env.staging \
                down
              docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml \
                --env-file .env.staging \
                up -d
              exit 1
            fi

            # Cleanup
            echo "🧹 Cleaning up old images..."
            docker image prune -af --filter "until=24h"
            docker volume prune -f

            echo "✅ Staging deployment completed successfully!"

  # ── 3. Smoke Tests ─────────────────────────────────────────────────────────
  smoke-tests:
    name: Staging Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install smoke test dependencies
        run: npm ci

      - name: Run smoke tests against staging
        run: npx playwright test --config=apps/web/playwright.config.ts --project=smoke
        env:
          BASE_URL: https://staging.acadivo.com
          API_URL: https://staging.acadivo.com/api
        continue-on-error: true

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "✅ *Acadivo Staging Deployed*\nBranch: develop\nURL: https://staging.acadivo.com\nCommit: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "❌ *Acadivo Staging Deployment Failed*\nBranch: develop\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
