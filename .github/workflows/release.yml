# =============================================================================
# Acadivo — Release Workflow
# Triggers: version tag push (v*)
# Actions: Generate changelog → Create GitHub Release → Build Flutter APK/AAB → Upload assets
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/acadivo

jobs:
  # ── 1. Prepare Release Info ────────────────────────────────────────────────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Release version: $VERSION"

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: .github/changelog-config.json
          fromTag: ${{ steps.version.outputs.version }}
          toTag: ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build changelog manually (fallback)
        if: steps.changelog.outputs.changelog == ''
        id: manual-changelog
        run: |
          CHANGELOG=$(git log $(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo HEAD~20)..HEAD --pretty=format:'- %s (%h)' | head -50)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ── 2. Build & Push Release Images ─────────────────────────────────────────
  build-images:
    name: Build Release Images
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        service: [api, web, socket]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ needs.prepare.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Build Flutter Release ─────────────────────────────────────────────
  build-mobile:
    name: Build Flutter APK & AAB
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: apps/mobile

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android-keystore.jks
        working-directory: apps/mobile

      - name: Build APK
        run: flutter build apk --release
        working-directory: apps/mobile
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build AAB
        run: flutter build appbundle --release
        working-directory: apps/mobile
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK with version
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          mv apps/mobile/build/app/outputs/flutter-apk/app-release.apk \
             apps/mobile/build/app/outputs/flutter-apk/acadivo-${VERSION}.apk

      - name: Rename AAB with version
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          mv apps/mobile/build/app/outputs/bundle/release/app-release.aab \
             apps/mobile/build/app/outputs/bundle/release/acadivo-${VERSION}.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: acadivo-apk-${{ needs.prepare.outputs.version }}
          path: apps/mobile/build/app/outputs/flutter-apk/acadivo-*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: acadivo-aab-${{ needs.prepare.outputs.version }}
          path: apps/mobile/build/app/outputs/bundle/release/acadivo-*.aab

  # ── 4. Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-images, build-mobile]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: acadivo-apk-${{ needs.prepare.outputs.version }}
          path: artifacts/

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: acadivo-aab-${{ needs.prepare.outputs.version }}
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Acadivo v${{ needs.prepare.outputs.version }}"
          body: |
            ## What's Changed

            ${{ needs.prepare.outputs.changelog }}

            ## Docker Images
            ```
            docker pull ${{ env.IMAGE_PREFIX }}-api:${{ needs.prepare.outputs.version }}
            docker pull ${{ env.IMAGE_PREFIX }}-web:${{ needs.prepare.outputs.version }}
            docker pull ${{ env.IMAGE_PREFIX }}-socket:${{ needs.prepare.outputs.version }}
            ```

            ## Deployment
            ```bash
            # Production
            ./scripts/deploy.sh ${{ needs.prepare.outputs.version }}
            ```
          files: |
            artifacts/acadivo-*.apk
            artifacts/acadivo-*.aab
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update major version tag
        if: ${{ !contains(github.ref, '-') }}
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          git tag -f v$MAJOR
          git push -f origin v$MAJOR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
