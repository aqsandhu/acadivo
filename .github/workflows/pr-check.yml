# =============================================================================
# Acadivo — Pull Request Validation
# Optimized checks for changed packages only + PR quality gates
# =============================================================================

name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  NODE_ENV: test
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ── 0. Detect Changed Packages ─────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      socket: ${{ steps.filter.outputs.socket }}
      shared: ${{ steps.filter.outputs.shared }}
      mobile: ${{ steps.filter.outputs.mobile }}
      docker: ${{ steps.filter.outputs.docker }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'packages/api/**'
              - 'packages/shared/**'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
            socket:
              - 'packages/socket/**'
              - 'packages/shared/**'
            shared:
              - 'packages/shared/**'
            mobile:
              - 'apps/mobile/**'
            docker:
              - 'docker/**'
              - '.github/workflows/**'
            any:
              - 'packages/**'
              - 'apps/**'
              - 'docker/**'

  # ── 1. Lint Changed Packages ───────────────────────────────────────────────
  lint-changed:
    name: Lint Changed
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.any == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint changed files only
        run: npx eslint $(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}..HEAD | grep -E '\.(ts|tsx|js|jsx)$' || echo "") --no-error-on-unmatched-pattern

      - name: Prettier check changed files
        run: npx prettier --check $(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}..HEAD | grep -E '\.(ts|tsx|js|jsx|json|md|yaml|yml)$' || echo "") --no-error-on-unmatched-pattern

  # ── 2. Type Check Changed Packages ─────────────────────────────────────────
  typecheck-changed:
    name: Type Check Changed
    runs-on: ubuntu-latest
    needs: [changes, lint-changed]
    strategy:
      matrix:
        package: [api, web, socket, shared]
    if: ${{ needs.changes.outputs[matrix.package] == 'true' || needs.changes.outputs.shared == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check ${{ matrix.package }}
        run: npx tsc --noEmit -p packages/${{ matrix.package }}/tsconfig.json

  # ── 3. Test Changed Packages ───────────────────────────────────────────────
  test-api-changed:
    name: Test API (Changed)
    runs-on: ubuntu-latest
    needs: [changes, typecheck-changed]
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true' }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: acadivo
          POSTGRES_PASSWORD: acadivo_test
          POSTGRES_DB: acadivo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://acadivo:acadivo_test@localhost:5432/acadivo_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-key
      JWT_REFRESH_SECRET: test-jwt-refresh-secret
      NODE_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      - name: Run API tests
        run: cd packages/api && npm run test:ci

  test-web-changed:
    name: Test Web (Changed)
    runs-on: ubuntu-latest
    needs: [changes, typecheck-changed]
    if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run web unit tests
        run: cd apps/web && npm run test:unit

  test-socket-changed:
    name: Test Socket (Changed)
    runs-on: ubuntu-latest
    needs: [changes, typecheck-changed]
    if: ${{ needs.changes.outputs.socket == 'true' || needs.changes.outputs.shared == 'true' }}
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run socket tests
        run: cd packages/socket && npm run test:ci

  # ── 4. PR Quality Gates ────────────────────────────────────────────────────
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        id: size
        run: |
          CHANGES=$(git diff --stat origin/${{ github.base_ref }}..HEAD | tail -1)
          INSERTIONS=$(echo "$CHANGES" | grep -oP '\d+(?= insertion)' || echo 0)
          DELETIONS=$(echo "$CHANGES" | grep -oP '\d+(?= deletion)' || echo 0)
          TOTAL=$((INSERTIONS + DELETIONS))
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "insertions=$INSERTIONS" >> $GITHUB_OUTPUT
          echo "deletions=$DELETIONS" >> $GITHUB_OUTPUT

      - name: Comment on PR if too large
        if: steps.size.outputs.total > 500
        uses: actions/github-script@v7
        with:
          script: |
            const total = ${{ steps.size.outputs.total }};
            const insertions = ${{ steps.size.outputs.insertions }};
            const deletions = ${{ steps.size.outputs.deletions }};
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **PR Size Warning**\n\nThis PR has **${total}** lines changed (+${insertions}/-${deletions}).\n\nConsider breaking it down into smaller, focused PRs for easier review.\n\n> Best practice: keep PRs under 500 lines when possible.`
            });

  # ── 5. Dependency Review ───────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          vulnerability-check: true
          license-check: true
          comment-summary-in-pr: true

  # ── 6. Docker Build Test ───────────────────────────────────────────────────
  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' || needs.changes.outputs.any == 'true' }}
    strategy:
      matrix:
        service: [api, web, socket]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.service }}
          push: false
          tags: acadivo-${{ matrix.service }}:pr-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
