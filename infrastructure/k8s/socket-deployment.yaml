# =============================================================================
# Acadivo — Socket.io Deployment (2 replicas)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acadivo-socket
  namespace: acadivo
  labels:
    app: acadivo
    component: socket
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: acadivo
      component: socket
  template:
    metadata:
      labels:
        app: acadivo
        component: socket
    spec:
      containers:
        - name: socket
          image: ghcr.io/acadivo/acadivo-socket:latest
          ports:
            - containerPort: 5001
              name: websocket
          envFrom:
            - configMapRef:
                name: acadivo-config
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
