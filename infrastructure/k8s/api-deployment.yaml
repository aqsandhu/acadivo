# =============================================================================
# Acadivo — API Deployment (3 replicas)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acadivo-api
  namespace: acadivo
  labels:
    app: acadivo
    component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: acadivo
      component: api
  template:
    metadata:
      labels:
        app: acadivo
        component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/acadivo/acadivo-api:latest
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: acadivo-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: JWT_REFRESH_SECRET
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: CLOUDINARY_API_SECRET
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: SMTP_HOST
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: SMTP_PASS
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: acadivo-secrets
                  key: TWILIO_PHONE_NUMBER
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
