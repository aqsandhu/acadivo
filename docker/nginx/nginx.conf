# =============================================================================
# Acadivo — Nginx Reverse Proxy Configuration
# Handles: SSL termination, rate limiting, gzip, caching, WebSocket upgrades
# =============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    client_body_buffer_size 16K;

    # ── Gzip Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Rate Limiting Zones ────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=socket_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream Load Balancing ────────────────────────────────────────────
    upstream api_backend {
        least_conn;
        server api:5000 max_fails=3 fail_timeout=30s;
        # Additional replicas added by docker-compose scale
        keepalive 32;
    }

    upstream socket_backend {
        ip_hash;  # Sticky sessions for WebSocket
        server socket:5001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream web_backend {
        least_conn;
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── SSL Configuration ──────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # SSL stapling requires working DNS resolver; enabled conditionally per server
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── Request ID Generation ──────────────────────────────────────────────
    map $http_x_request_id $request_id {
        default   $http_x_request_id;
        ""        $request_id_internal;
    }
    map "" $request_id_internal {
        ""  $pid-$msec-$remote_addr;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'rid=$request_id';

    access_log /var/log/nginx/access.log main;

    # ── Include Security Headers ───────────────────────────────────────────
    include /etc/nginx/security/headers.conf;

    # ── Rate limit status ──────────────────────────────────────────────────
    limit_req_status 429;
    limit_conn_status 429;

    # ── Custom 429 error page ──────────────────────────────────────────────
    error_page 429 @rate_limited;
    location @rate_limited {
        return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
        add_header Content-Type application/json;
    }

    # ===================================================================
    # HTTP → HTTPS Redirect
    # ===================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name acadivo.com www.acadivo.com staging.acadivo.com api.acadivo.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # ===================================================================
    # Production — acadivo.com
    # ===================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name acadivo.com www.acadivo.com;

        ssl_certificate /etc/letsencrypt/live/acadivo.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/acadivo.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/acadivo.com/chain.pem;

        # ── Security Headers ───────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── Static File Caching ──────────────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header Vary Accept-Encoding;
            access_log off;
        }

        # ── API Proxy ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://api_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ── Socket.io WebSocket Proxy ────────────────────────────────────────
        location /socket.io/ {
            limit_req zone=socket_limit burst=50 nodelay;

            proxy_pass http://socket_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket-specific timeouts and buffering
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Disable buffering for real-time communication
            proxy_buffering off;
            proxy_cache off;

            # WebSocket ping/pong handling
            proxy_set_header X-NginX-Proxy true;
            proxy_redirect off;

            # Handle WebSocket close properly
            proxy_socket_keepalive on;
        }

        # ── Next.js Web App ──────────────────────────────────────────────────
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── Health Check Endpoint (for ALB/ELB) ────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # ===================================================================
    # Staging — staging.acadivo.com
    # ===================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name staging.acadivo.com;

        ssl_certificate /etc/letsencrypt/live/staging.acadivo.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staging.acadivo.com/privkey.pem;

        add_header X-Robots-Tag "noindex, nofollow" always;

        location /api/ {
            proxy_pass http://api_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            proxy_pass http://socket_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
