# =============================================================================
# Acadivo — Docker Compose Production Override
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================
# Changes from base:
# - Remove volume mounts (use built images only)
# - Restart always, resource limits
# - External logging, monitoring stack
# - Multiple API replicas with load balancing
# =============================================================================

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes: !reset []
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
        tag: "{{.Name}}/{{.ID}}"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    volumes: !reset []
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── API Service ────────────────────────────────────────────────────────────
  api:
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        order: stop-first
    volumes: !reset []
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # No port exposure (accessed through nginx only)
    ports: !reset []
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Socket.io Service ───────────────────────────────────────────────────────
  socket:
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first
    volumes: !reset []
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    ports: !reset []
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Next.js Web Service ────────────────────────────────────────────────────
  web:
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
    volumes: !reset []
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    ports: !reset []

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: acadivo-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./security/headers.conf:/etc/nginx/security/headers.conf:ro
      - ./security/csp.conf:/etc/nginx/security/csp.conf:ro
      - ./security/rate-limit.conf:/etc/nginx/security/rate-limit.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
      socket:
        condition: service_healthy
    networks:
      - acadivo-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Certbot for SSL ────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: acadivo-certbot
    restart: unless-stopped
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    networks:
      - acadivo-network

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: acadivo-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - acadivo-network
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: acadivo-grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_ROOT_URL: https://monitoring.acadivo.com
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Node Exporter ──────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: acadivo-node-exporter
    restart: always
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring-network

  # ── Loki (Log Aggregation) ───────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    environment:
      - LOKI_USER=${LOKI_USER:-loki}
      - LOKI_PASSWORD=${LOKI_PASSWORD}
    container_name: acadivo-loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Promtail (Log Shipper) ─────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: acadivo-promtail
    restart: always
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring-network

  # ── Redis Exporter ───────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: acadivo-redis-exporter
    restart: always
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - acadivo-network
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ── PostgreSQL Exporter ──────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: acadivo-postgres-exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=${DATABASE_URL:-postgresql://acadivo:acadivo@postgres:5432/acadivo?sslmode=disable}
    ports:
      - "9187:9187"
    networks:
      - acadivo-network
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ── Alertmanager ─────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: acadivo-alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alert_rules.yml:/etc/alertmanager/alert_rules.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alert_rules.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  acadivo-network:
    driver: bridge
  monitoring-network:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_data:
    driver: local
  certbot_www:
    driver: local
  nginx_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  alertmanager_data:
    driver: local
