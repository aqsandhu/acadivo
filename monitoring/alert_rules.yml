# Acadivo Prometheus Alert Rules (14 rules)

groups:
  - name: acadivo-alerts
    interval: 15s
    rules:
      # 1. API High Error Rate
      - alert: APIHighErrorRate
        expr: rate(socketio_connections_active{job="acadivo-api"}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "API high error rate detected"
          description: "API error rate is above 10% for more than 2 minutes"

      # 2. API High Latency
      - alert: APIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="acadivo-api"}[5m])) > 2
        for: 3m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "API latency is high"
          description: "95th percentile latency is above 2 seconds"

      # 3. Socket Server Down
      - alert: SocketServerDown
        expr: up{job="acadivo-socket"} == 0
        for: 1m
        labels:
          severity: critical
          service: socket
        annotations:
          summary: "Socket server is down"
          description: "Socket.io server has been down for more than 1 minute"

      # 4. High Socket Connection Count
      - alert: HighSocketConnections
        expr: socketio_connections_active > 10000
        for: 5m
        labels:
          severity: warning
          service: socket
        annotations:
          summary: "High socket connection count"
          description: "Socket connections exceed 10,000"

      # 5. Database Connection Failed
      - alert: DatabaseConnectionFailed
        expr: up{job="acadivo-api"} == 0
        for: 2m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "Database connection failed"
          description: "Cannot connect to PostgreSQL database"

      # 6. Redis Down
      - alert: RedisDown
        expr: up{job="redis"} == 0 or redis_connected_clients == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down or unreachable"
          description: "Redis server is not responding"

      # 7. High Memory Usage
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 85%"

      # 8. High CPU Usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for more than 5 minutes"

      # 9. Disk Space Low
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "Disk space critically low"
          description: "Less than 10% disk space remaining"

      # 10. Web Frontend Down
      - alert: WebFrontendDown
        expr: up{job="acadivo-web"} == 0
        for: 2m
        labels:
          severity: critical
          service: web
        annotations:
          summary: "Web frontend is down"
          description: "Next.js web server is not responding"

      # 11. Nginx High Error Rate
      - alert: NginxHighErrorRate
        expr: rate(nginx_http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
          service: nginx
        annotations:
          summary: "Nginx high error rate"
          description: "Nginx 5xx error rate is above 5%"

      # 12. SSL Certificate Expiry
      - alert: SSLCertificateExpiring
        expr: (ssl_certificate_expiry_seconds / 86400) < 7
        for: 1m
        labels:
          severity: warning
          service: nginx
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate will expire in less than 7 days"

      # 13. Container Restart Rate
      - alert: ContainerRestartRate
        expr: rate(container_restarts_total[15m]) > 3
        for: 5m
        labels:
          severity: warning
          service: docker
        annotations:
          summary: "Container restarting frequently"
          description: "Container has restarted more than 3 times in 15 minutes"

      # 14. Log Volume Spike
      - alert: LogVolumeSpike
        expr: rate(loki_distributor_lines_received_total[5m]) > 10000
        for: 5m
        labels:
          severity: info
          service: logging
        annotations:
          summary: "Log volume spike detected"
          description: "Log ingestion rate is abnormally high"
