# =============================================================================
# Acadivo — Content Security Policy for Nginx
# Restricts resource loading to prevent XSS and data injection
# =============================================================================

# Use in nginx.conf with: add_header Content-Security-Policy "..." always;

# Production CSP (strict)
# Adjust as needed for CDN, analytics, etc.
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://www.googletagmanager.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: blob: https://*.cloudinary.com https://*.googleusercontent.com;
    connect-src 'self' https://api.acadivo.com https://staging.acadivo.com https://acadivo.com wss://acadivo.com https://*.google-analytics.com;
    media-src 'self' https://*.cloudinary.com;
    object-src 'none';
    frame-ancestors 'self';
    base-uri 'self';
    form-action 'self';
    upgrade-insecure-requests;
" always;

