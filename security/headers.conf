# =============================================================================
# Acadivo — Security Headers for Nginx
# Applied globally via nginx.conf include
# =============================================================================

# Content Security Policy (loaded separately for flexibility)
# include /etc/nginx/security/csp.conf;

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# XSS Protection (legacy browsers)
add_header X-XSS-Protection "1; mode=block" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy (formerly Feature Policy)
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), midi=()" always;

# Strict Transport Security (HSTS) — enabled in SSL server blocks
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Cross-Origin policies
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Hide server version info (headers-more module not available in nginx:alpine)
server_tokens off;
