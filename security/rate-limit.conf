# =============================================================================
# Acadivo — Rate Limiting Rules for Nginx
# Included in nginx.conf limit_req_zone directives
# =============================================================================

# Generic burst handling
# limit_req zone=general burst=50 nodelay;

# API endpoints
# limit_req zone=api_limit burst=20 nodelay;

# Authentication endpoints (strict)
# limit_req zone=auth_limit burst=5 nodelay;

# Socket.io connections
# limit_req zone=socket_limit burst=50 nodelay;

# Connection limits
# limit_conn conn_limit 10;

# Block abusive IPs automatically
# geo $blocked_ip {
#     default 0;
#     include /etc/nginx/blocked_ips.conf;
# }

# map $blocked_ip $limit {
#     1 $binary_remote_addr;
#     0 "";
# }

# Ban repeat offenders
# limit_req_status 429;
# limit_conn_status 429;

# Custom 429 error page
# error_page 429 @rate_limited;
# location @rate_limited {
#     return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
#     add_header Content-Type application/json;
# }
